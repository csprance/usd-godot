name: Build Godot USD Extension

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            platform: linux
            binary: libgodot-usd.so
          - name: windows-x86_64
            os: windows-2022
            platform: windows
            binary: godot-usd.dll
          - name: macos-universal
            os: macos-14
            platform: macos
            binary: libgodot-usd.dylib

    env:
      USD_INSTALL_DIR: ${{ github.workspace }}/build-usd/install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scons
        run: python -m pip install --upgrade pip scons

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            unzip \
            libglu1-mesa-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxext-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libglew-dev \
            zlib1g-dev

      - name: Activate MSVC environment
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone godot-cpp
        shell: bash
        run: |
          set -e
          if [ ! -d "godot-cpp/.git" ]; then
            if [ -d "godot-cpp" ]; then
              rm -rf godot-cpp
            fi
            git clone --depth 1 --branch godot-4.4-stable https://github.com/godotengine/godot-cpp.git godot-cpp
          fi

      - name: Cache USD build
        uses: actions/cache@v4
        with:
          path: |
            build-usd/install
            build-usd/build
            build-usd/deps/install
          key: ${{ runner.os }}-usd-${{ hashFiles('build-usd-minimal.sh', 'build-usd-minimal.bat') }}

      - name: Cache godot-cpp build artifacts
        uses: actions/cache@v4
        with:
          path: |
            godot-cpp/bin
            godot-cpp/gen
          key: ${{ runner.os }}-godotcpp-godot-4.4-stable-v1

      - name: Build minimal USD toolchain (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          if [ -f "${USD_INSTALL_DIR}/cmake/pxrTargets.cmake" ]; then
            echo "=== USD already installed (cache hit), skipping build ==="
            exit 0
          fi
          ./build-usd-minimal.sh

      - name: Build minimal USD toolchain (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          if exist "%USD_INSTALL_DIR%\cmake\pxrTargets.cmake" (
            echo === USD already installed ^(cache hit^), skipping build ===
            exit /b 0
          )
          call build-usd-minimal.bat

      - name: Build Godot USD extension (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: ./build.sh

      - name: Build Godot USD extension (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: build.bat

      - name: Stage addon payload
        shell: bash
        run: |
          set -e
          echo "=== Staging start ==="
          pwd
          DIST_DIR="dist/${{ matrix.name }}/addons/godot-usd"
          mkdir -p "$DIST_DIR/bin"
          cp addons/godot-usd/plugin.cfg "$DIST_DIR/"
          cp addons/godot-usd/plugin.gd "$DIST_DIR/"
          cp addons/godot-usd/godot-usd.gdextension "$DIST_DIR/"
          echo "=== Searching for binary ${{ matrix.binary }} ==="
          BINARY_PATH=$(find . -name "${{ matrix.binary }}" -type f 2>/dev/null | grep -v '/build-usd/' | head -n1 || true)
          if [ -z "$BINARY_PATH" ]; then
            echo "::error::built binary ${{ matrix.binary }} not found anywhere"
            echo "--- top-level repo dirs:"
            ls -la
            echo "--- bin/ contents (recursive):"
            ls -laR bin 2>/dev/null || echo "(no bin/)"
            echo "--- lib/ contents (recursive):"
            ls -laR lib 2>/dev/null || echo "(no lib/)"
            echo "--- build/ contents (top 100 files):"
            find build -maxdepth 5 2>/dev/null | head -n 100 || echo "(no build/)"
            echo "--- any *.dll, *.so, *.dylib outside build-usd/:"
            find . \( -name '*.dll' -o -name '*.so' -o -name '*.dylib' \) -type f 2>/dev/null | grep -v '/build-usd/' | head -n 50
            exit 1
          fi
          echo "Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" "$DIST_DIR/bin/"

          # USD plugInfo resources (monolithic static build still needs runtime resource discovery)
          if [ -d "${USD_INSTALL_DIR}/lib/usd" ]; then
            cp -R "${USD_INSTALL_DIR}/lib/usd" "$DIST_DIR/bin/usd"
          else
            echo "Warning: USD plugInfo resources not found at ${USD_INSTALL_DIR}/lib/usd"
          fi

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-usd-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14
          path: dist/${{ matrix.name }}

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches plugin.cfg version
        run: |
          set -e
          CFG_VERSION=$(grep '^version=' addons/godot-usd/plugin.cfg | cut -d'"' -f2)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "plugin.cfg version: ${CFG_VERSION}"
          echo "git tag version:    ${TAG_VERSION}"
          if [ "${CFG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Git tag '${GITHUB_REF_NAME}' does not match plugin.cfg version '${CFG_VERSION}'. Bump plugin.cfg before tagging."
            exit 1
          fi
          echo "VERSION=${CFG_VERSION}" >> "$GITHUB_ENV"

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: godot-usd-*

      - name: Build release zips
        run: |
          set -e
          mkdir -p dist

          # Per-platform zips — each contains only one platform's binary.
          for d in artifacts/godot-usd-*; do
            platform=$(basename "$d" | sed 's/^godot-usd-//')
            (cd "$d" && zip -r "${GITHUB_WORKSPACE}/dist/godot-usd-${platform}-v${VERSION}.zip" addons)
          done

          # Universal zip — merges all platform binaries into one addons/godot-usd/bin tree.
          mkdir -p universal/addons/godot-usd/bin
          cp artifacts/godot-usd-linux/addons/godot-usd/plugin.cfg universal/addons/godot-usd/
          cp artifacts/godot-usd-linux/addons/godot-usd/plugin.gd universal/addons/godot-usd/
          cp artifacts/godot-usd-linux/addons/godot-usd/godot-usd.gdextension universal/addons/godot-usd/
          for d in artifacts/godot-usd-*; do
            cp -R "$d/addons/godot-usd/bin/." universal/addons/godot-usd/bin/
          done
          (cd universal && zip -r "${GITHUB_WORKSPACE}/dist/godot-usd-universal-v${VERSION}.zip" addons)

          ls -la dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
